name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.2'

    # ✅ Скачиваем все зависимости проекта
    - name: Download dependencies
      run: go mod download

    # ✅ Запуск golangci-lint через официальный Action
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: v1.59.0

    # ✅ Сборка проекта
    - name: Build
      run: go build ./...

    # ✅ Запуск тестов
    - name: Test
      run: go test ./... -v -coverprofile=coverage.out