name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'  # ← ИЗМЕНИТЕ: 1.26.2 → 1.24 (такой версии нет)

    # ✅ Скачиваем все зависимости проекта
    - name: Download dependencies
      run: go mod download

    # ✅ Запуск golangci-lint через официальный Action
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v4  # ← ИЗМЕНИТЕ: v3 → v4
      with:
        version: latest  # ← ИЗМЕНИТЕ: v1.59.0 → latest
        args: --timeout=5m  # ← ДОБАВЬТЕ эту строку

    # ✅ Сборка проекта
    - name: Build
      run: go build ./...

    # ✅ Запуск тестов
    - name: Test
      run: go test ./... -v -coverprofile=coverage.out